<h1>Nitter について</h1>
<hr>
<p>Nitter は Twitter の投稿をブラウザ上から閲覧するためのフロントエンドです。あなたのコンピュータから直接 Twitter にアクセスされることはなく、Javascript や広告はありません。Twitter や Google アナリティクスのサーバに IP アドレスや閲覧履歴が漏洩することもなく、プライバシーが保たれます。Nitter は AGPLv3 でライセンスされた自由ソフトウェアだけによって構成されているため、本当にそのようにプログラムが実装されているのかどうかを誰でも検証することができるようになっています。</p>
